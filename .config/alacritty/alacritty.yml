font:
  normal:
    family: SauceCodePro Nerd Font Mono 
    style: Regular

  bold:
    family: SauceCodePro Nerd Font Mono 
    style: Bold

  italic:
    family: SauceCodePro Nerd Font Mono 
    style: Italic

  bold_italic:
    family: SauceCodePro Nerd Font Mono 
    style: Bold Italic

  size: 9

key_bindings:
  - { key: Return,   mods: Control|Shift, action: SpawnNewInstance }
mouse_bindings:
  - { mouse: Middle, action: PasteSelection }

background_opacity: 0.8
